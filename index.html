<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App Glassmorphism</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <!-- Fullscreen Map Container -->
  <div id="map"></div>

  <!-- Glassmorphism Weather Panel -->
  <main class="weather-panel">
    <!-- Weather Information Display -->
    <div id="weather-info" class="weather-info hidden">
      <div class="location-header">
        <h2 id="location-name">Ciudad</h2>
        <p id="coords-display"
          style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px; margin-bottom: 4px; font-family: monospace;">
        </p>
        <p id="weather-desc">Descripción</p>
      </div>

      <div class="main-temp-container">
        <!-- Animated Weather Icon -->
        <div id="weather-icon-container" class="weather-icon">
          <!-- SVG paths will be injected here via JS -->
        </div>
        <h1 id="temperature" class="temperature">--°</h1>
      </div>

      <!-- Weather Details Grid -->
      <div class="weather-details">
        <div class="detail-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
          </svg>
          <div class="detail-text">
            <span class="detail-label">Humedad</span>
            <span id="humidity" class="detail-value">--%</span>
          </div>
        </div>
        <div class="detail-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2">
            </path>
          </svg>
          <div class="detail-text">
            <span class="detail-label">Viento</span>
            <span id="wind-speed" class="detail-value">-- km/h</span>
          </div>
        </div>
      </div>

      <!-- 3-Day Forecast -->
      <div id="forecast-container" class="forecast-container hidden">
        <h3 class="forecast-title">Próximos 3 días</h3>
        <div id="forecast-days" class="forecast-days">
          <!-- Days injected via JS -->
        </div>

        <!-- Hourly Forecast View (Hidden by default) -->
        <div id="hourly-forecast-container" class="hourly-container hidden">
          <div class="hourly-header">
            <span id="hourly-day-title">Horario</span>
            <button id="close-hourly-btn" class="close-btn">&times;</button>
          </div>
          <div id="hourly-list" class="hourly-list">
            <!-- Hourly items injected via JS -->
          </div>
        </div>
      </div>
    </div>

    <!-- Loading State -->
    <div id="loading-state" class="loading-state hidden">
      <div class="spinner"></div>
      <p>Buscando el cielo...</p>
    </div>

    <!-- Initial State Instructions -->
    <div id="initial-state" class="initial-state">
      <p>Haz clic en cualquier punto del mapa para ver el clima de esa ubicación exacta.</p>
    </div>

  </main>

  <script type="module" src="./main.js"></script>
</body>

</html>
